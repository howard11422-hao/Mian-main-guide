<style>
  * { box-sizing: border-box; -webkit-text-size-adjust: 100%; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: "Noto Sans TC", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #fafaf8; color: #1a1a1a;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column;
  }
  #app { display: flex; flex-direction: column; height: 100%; overflow: hidden; width: 100%; }
  header { flex-shrink: 0; padding: 20px 24px 14px; border-bottom: 1px solid #e8e4dc; background: #fafaf8; }

  main { flex: 1; min-height: 0; padding: 24px 24px 28px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  footer { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; border-top: 1px solid #e8e4dc; background: #fafaf8; }
  .nav { font-size: 14px; padding: 8px 16px; border-radius: 8px; border: 1px solid #cfcac2; background: #fff; color: #1a1a1a; cursor: pointer; }

  .reset { width: 100%; margin-top: 12px; font-size: 13px; padding: 10px; border-radius: 8px; border: 1px solid #cfcac2; background: none; color: #8a8378; cursor: pointer; }

<script>
const STORAGE_KEY = "mianmian-guide-web-v1";
const TRANSLATE_ENDPOINT = "/.netlify/functions/translate";

const INITIAL_ITEMS = [
  {"id": "intro", "label": "開場", "title": "展場全体紹介", "fixed": true, "zh": "歡迎蒞臨實踐大學媒體傳達設計學系2026年畢業展《面_面》(Between Faces)。「面」這個字，一方面是平面的「面」，另一方面也是人與人相對而視的「臉」。本系展覽匯集了影像、遊戲、文字設計、出版、裝置等各種形式的作品，也歡迎大家漫步其中、與作品的各種面向相會", "ja": "実践大学メディアコミュニケーションデザイン学科2026年度卒業展「面_面」(Between Faces)へようこそお越しくださいました。「面」という文字は、一つには平面の「面」を意味し、もう一つには人と人が向き合って見つめ合う「顔」をも意味しています。本学科の展覧会では、映像、ゲーム、タイポグラフィ、出版、インスタレーションなど、様々な形式の作品を集めました。どうぞゆっくりと会場内を歩きながら、作品の様々な面と出会っていただければと思います"},
  {"id": "1", "label": "01", "title": "曾楷棻『フォーメーション／ミラー』", "zh": "這是一個互動情境的體驗。\n\n概念：\n「人們對於自我的認知並非來自內在的覺察，而是透過他人的反應以及外界的影響所形塑。」\n\n完整作品拆分為三個體驗階段，目前展示的是「幻象」的部分。 VR可以觀看720影響。\n\n幻象是在模擬人們在睡夢中才會重新審視自己是什麼樣的人，聽著背景的聲音引導觀眾感受我們平時是如何被觀看、被期待、被定義，我們又怎麼透過這些反應思考自己的存在。", "ja": "こちらはインタラクティブな体験型の展示となっております。\n\nコンセプトは、「人々の自己認識は内面からの気づきによるものではなく、他者の反応や外部からの影響によって形作られる」というものです。\n\n作品全体は三つの体験段階に分かれており、現在展示しているのは「幻象」のパートになります。VRでは720度の映像をご覧いただけます。\n\n「幻象」では、人々が夢の中でようやく自分自身がどのような人間なのかを見つめ直す様子をシミュレートしています。バックグラウンドの音声に導かれながら、普段私たちがどのように見られ、期待され、定義されているのか、そしてそうした反応を通じてどのように自分の存在について考えているのか、その感覚を体感していただきます。"},
  {"id": "12", "label": "12", "title": "林詠丞『窓辺に咲く（鉄窓花の文字）』", "zh": "這位創作者關注台灣街景中常見卻極具特色的「鐵窗花」造型，並融合漢字的造字規則，將兩者結合後設計成一套獨特的typo graphic的字體設計。\n\n上方牆上的立體作品請不要觸碰外，桌面上的紙品都可以自由翻閱", "ja": "こちらの作家は、台湾の街並みでよく見られる、とても特徴的な「鉄窓花」のデザインに注目し、漢字の造字ルールと組み合わせることで、独自のタイポグラフィックなフォントデザインを作り上げました。\n\n上の壁に展示されている立体作品には触れないようお願いいたしますが、テーブルの上の印刷物は自由にご覧いただけます。"},
  {"id": "3", "label": "03", "title": "鄭宇晴／黃星伶／陳妍宇『↑5F?! STUDIO』", "zh": "這件作品名叫《5F STUDIO》。是一間虛構的網紅經紀公司「5F STUDIO」推出新人網紅大偉、欣欣與PAPER，並舉辦出道粉絲見面會。作品藉「粉絲見面會」這個形式，重新叩問現代社會的認同渴望與流量文化——也就是我們內心那份「渴望被看見」的欲望。", "ja": "この作品は『5F STUDIO』というタイトルです。架空のインフルエンサー事務所「5F STUDIO」が、新人インフルエンサーである大偉、欣欣、そしてPAPERをデビューさせ、ファンミーティングを開催するという設定になっています。作品は「ファンミーティング」という形式を通じて、現代社会におけるアイデンティティへの渇望と、トラフィック文化、つまり私たちの心の中にある「見てもらいたい」という欲望について、改めて問いかけています。"},
  {"id": "9", "label": "09", "title": "呉霽『FRAVE』", "zh": "這是一款使用Unity與實體遊戲機台製作的新世代節奏遊戲。玩家在立體空間中揮動身體，隨著音樂節奏斬擊，是一款強調全身參與的體感遊戲。原始的作品是一個相當大的用3D列印製作的機台，本次展示的是iPad遊戲版本。", "ja": "こちらはUnityと実物のゲーム筐体を使って制作した新世代のリズムゲームです。プレイヤーは立体空間の中で体を動かし、音楽のリズムに合わせて斬撃を繰り出します。全身を使って参加することを重視した体感型ゲームとなっております。オリジナルの作品は3Dプリンターで制作したかなり大きな筐体なのですが、今回展示しているのはiPad版のゲームとなります。"},
  {"id": "5", "label": "05", "title": "葉芷涵『どうせ食べるんでしょ』", "zh": "這是一款使用Swift與VisionKit OCR技術開發的手機應用程式《食育掃描器》。透過掃描食品包裝上的成分標示，玩家能夠「捕捉」食品添加物，是一款寓教於樂的食育遊戲。複雜的知識與台灣食品添加物的歷史，被重新設計成有趣的圖鑑收集系統，讓人一邊玩一邊學習更健康的飲食方式。", "ja": "こちらはSwiftとVisionKitのOCR技術を使ったスマートフォンアプリ「FOOD SCANNER」です。食品パッケージの成分表示をスキャンすることで、食品添加物を「捕まえる」食育ゲームとなっています。複雑な知識や台湾における食品添加物の歴史を、図鑑コレクションという楽しい形に再構成することで、遊びながら健康的な食生活について学べるよう設計されています。"},
  {"id": "8", "label": "08", "title": "洪研恩『モノたち（DONG.C.MEN）』", "zh": "這件作品結合了毛線、數位動畫。主題是日常生活中那些難以命名的細微瞬間。本次展示的是動畫中出現的三個角色的複合媒材作品\n", "ja": "この作品は毛糸とデジタルアニメーションを組み合わせたものです。テーマは日常生活の中で名前をつけることが難しい、ささやかな瞬間を捉えています。今回展示しておりますのは、アニメーションに登場する三人のキャラクターを用いた複合メディア作品となっております"},
  {"id": "6", "label": "06", "title": "李心妤／張宸『MINTS マガジン』", "zh": "這是一份紙本藝術雜誌《MINTS》。刊名取自「鑄造(minting)」與「薄荷(mint)」兩個詞的結合，透過與世界各地藝術家的共同創作，以攝影、文字、裝置等多種形式捕捉日常的片段。將孤立的瞬間編織在一起，重新以嶄新視角凝視生活中細膩的角落，構成一則廣闊的敘事。", "ja": "こちらは紙媒体のアート誌『MINTS』です。「鋳造（minting）」と「ミント（mint）」という二つの言葉から名づけられたこの雑誌は、世界各地のアーティストとの共同制作を通じて、写真、文章、インスタレーションなど多様な形式で日常の断片を捉えています。孤立した瞬間の数々を織り合わせることで、日常の細部を新しい視点から見つめ直す、広やかな物語を紡いでいます。"},
  {"id": "4", "label": "04", "title": "「面_面」卒展関連グッズ", "zh": "這裡是畢業展《面_面》的原創周邊商品區，是本屆的學生畢展團隊設計的商品，在台灣的新一代設計展與華山展覽會場進行販售。透過不同功能與情境的商品，吸引到更多的觀眾，也呼應著透過設計去進行不同面向間溝通的畢展主題。\n\n海報—我們特製的海報能夠以不同的視角呈現不同的圖案。\n\n面面機—這台機器是兩台一組的自拍攝影機，會將兩顆鏡頭看到的畫面截取一塊並傳輸替換，將兩邊的畫面各自重組。\n\n軟緬緬—這條圍巾上的圖案是將本次畢展每一位畢業生的作品做成一個代表性Icon並集結而成的拼被，並且只要拿出手機靠近黑色的標籤，就能夠連接到畢展的網站", "ja": "こちらは卒業展「面_面」のオリジナルグッズエリアです。今年度の学生卒展チームがデザインした商品で、台湾の新一代設計展や華山展示会場で販売されています。様々な機能やシチュエーションの商品を通じて、より多くの観客に興味を持っていただくとともに、デザインを通じて異なる側面をつなぐという卒展のテーマにも呼応しています。\n\nポスター—特製のポスターは、見る角度によって異なる図柄が現れます。\n\n面面機—この機械は2台セットのセルフ撮影機です。2つのカメラが捉えた映像の一部を切り取って送信し入れ替えることで、両側の映像をそれぞれ再構成します。\n\n軟緬緬—このマフラーの図柄は、今回の卒展に参加する卒業生全員の作品を代表的なアイコンにして集めたパッチワークになっています。そして、スマートフォンを黒いタグに近づけるだけで、卒展のウェブサイトにアクセスできます。"},
  {"id": "7", "label": "07", "title": "原画・制作資料展示ウォール『SKETCH & PROCESS WALL』", "zh": "這面草圖牆上，收錄了學生們的草稿、分鏡、設定圖等創作痕跡，記錄下反覆修改與嘗試的過程。每一件完成的作品背後，都存在著一個看不見的「面」。在這裡，那些看不見的過程碎片並列展示、彼此呼應，呈現出每位創作者走向完成之前，最真實的軌跡。", "ja": "このスケッチウォールには、学生たちのラフスケッチや絵コンテ、設定画など、描き直しと試行錯誤を重ねた創作の痕跡が集められています。完成した作品の背後には、表には現れないもうひとつの「面」が必ず存在します。ここでは、その見えない過程の断片たちが並び、互いに響き合いながら、それぞれの作家が完成に至るまでの、最も率直な軌跡を伝えています。"},
  {"id": "13", "label": "13", "title": "「面_面」公式ウェブサイト", "zh": "那台電腦中所展示的是畢業展《面_面》的官方網站。除了這次我們參加本次福岡展覽的作品外，大家也可以透過這個網站去看到所有畢業生的作品連結。", "ja": "あちらのパソコンに表示されているのは、卒業展「面_面」の公式ウェブサイトです。今回私たちが福岡展に出展している作品以外にも、このウェブサイトを通じて卒業生全員の作品リンクをご覧いただくことができます。"},
  {"id": "10", "label": "10", "title": "魏沛筵『冒険チワワ・タン』", "zh": "這是一款使用2D橫向捲軸的動作遊戲\n。主角是一隻名叫「炭吉 TANJI」的小吉娃娃，玩家將要操縱牠來打敗佔據王國的壞貓，拯救王國。", "ja": "これは2D横スクロール型のアクションゲームです。主人公は「炭吉 TANJI」という名前の小さなチワワで、プレイヤーはこのチワワを操作して、王国を占拠している悪い猫を倒し、王国を救うことになります。"},
  {"id": "11", "label": "11", "title": "林玉葶『DRINKTING』", "zh": "台灣的手搖飲文化算是相當有名的。這件作品便是以手搖飲為主題，描述主角在異星經營手搖飲攤位，要透過在不同的星球經營飲料店、滿足不同外星人的訂單，帶著珍珠奶茶的魔法將飲料文化傳播出去。", "ja": "台湾のタピオカドリンク文化は大変有名ですよね。こちらの作品はそのタピオカドリンクをテーマにしたもので、主人公が異星でドリンクスタンドを経営するというストーリーになっています。様々な惑星でお店を開き、色々な宇宙人の注文に応えながら、タピオカミルクティーの魔法で飲み物文化を広めていくという内容です。"},
  {"id": "2", "label": "02", "title": "卒業制作映像・学科紹介上映", "zh": "這個投影牆所播放的是畢業製作動畫影片與學系介紹影片。十幾部主題與風格各異的動畫作品依序播放以外，表現不同作者所關注與描述故事的不同面向。", "ja": "この投影壁では、卒業制作のアニメーション作品と学科紹介の映像を上映しております。十数本のテーマやスタイルが異なるアニメーション作品を順番にご覧いただけますが、それぞれの作品は作者が注目したテーマや物語の異なる側面を表現しております。"},
  {"id": "14", "label": "14", "title": "実践大学メディアコミュニケーションデザイン学科　学科公式ウェブサイト", "zh": "最後為大家介紹的是實踐大學媒體傳達設計學系的官方網站。這個網站是認識本學系的起點，橫跨影像、互動、設計等領域，介紹我們如何思考與表現。歷屆學生透過作品與世界對話的軌跡，也都完整記錄在這裡。", "ja": "最後にご紹介するのは、実践大学メディアコミュニケーションデザイン学科の公式ウェブサイトです。このサイトは学科を知るための出発点として、映像、インタラクション、デザインの領域を横断しながら、私たちがいかに考え、表現しているのかを紹介しています。歴代の学生たちが作品を通して世界と対話してきた歩みも、あわせてご覧いただけます。"},
  {"id": "custom-1783041020188", "label": "＋", "title": "服裝設計學系", "zh": "實踐大學服裝設計學系創立於1961年，為台灣首創之服裝教育機構，也是本校歷史最悠久的系所。本次服裝系來到福岡參展的作品帶來了15位大三同學共30件作品的成品外，後方牆上的投影則是本屆畢業生的畢展影像紀錄。", "ja": "実践大学服飾デザイン学科は1961年に設立され、台湾初の服飾教育機関であり、本学で最も歴史のある学科でございます。今回、服飾デザイン学科が福岡に出展いたしました作品は、3年生15名による合計30点の作品となっておりまして、後ろの壁に映し出されている映像は、今年度の卒業生による卒業制作展の記録映像でございます。", "custom": true},
  {"id": "custom-1783045061901", "label": "＋", "title": "建築設計學系", "zh": "實踐大學建築設計學系近二十年來培養出許多另類建築人，除了具備設計領域之思考視野與專業的設計執行能力。這個學系在五年的教學過程中強調「工藝美學」、「人文視野」與「建築專業」之深化與融合。", "ja": "実践大学建築デザイン学科はこの約二十年間で、多くの個性的な建築人材を育ててまいりました。デザイン分野における思考力と専門的な設計実行能力を兼ね備えているのはもちろんのこと、本学科では五年間の教育課程において「工芸美学」「人文的視野」そして「建築専門性」の深化と融合を重視しております。", "custom": true},
  {"id": "custom-1783045266998", "label": "＋", "title": "工業產品設計學系", "zh": "實踐大學工業產品設計學系創立於 1992 年，學士班以「專業學習、國際視野、實務導向」 三大目標為主，而碩士班更著重於「實務與理論並重、跨領域課題研究」兩方面。", "ja": "実践大学工業製品デザイン学科は1992年に創立されました。学士課程では「専門的学習、国際的視野、実務指向」という三つの大きな目標を掲げております。そして修士課程ではさらに「実務と理論の両立、学際的な課題研究」という二つの側面を重視しております。", "custom": true},
  {"id": "custom-1783066907508", "label": "＋", "title": "建築作品1", "zh": "這件作品是以台灣的離島澎湖作為製作主題。裝置本是以澎湖的浪潮作為動力，推動燈光裝置的擺動，以此來表現澎湖浪潮和海風的一件作品。實際的現場紀錄可以請大家來到這邊牆面閱讀照片。\n裝置一共有九座，這次帶來了六支。", "ja": "この作品は台湾の離島である澎湖をテーマに制作されたものです。このインスタレーションは澎湖の波の動きを動力として、照明装置を揺らすことで、澎湖の波と海風を表現した作品となっています。実際の現場の記録写真につきましては、こちらの壁面でご覧いただけます。\nインスタレーションは全部で九基ございまして、今回はそのうち六基をお持ちしました。", "custom": true},
  {"id": "custom-1783067365762", "label": "＋", "title": "建築作品3", "zh": "他的畢業製作是一系列的空間裝置創作。關注的是關於時間、空間與劇場感。\n包含懸空的羅盤狀的三個裝置、入口處的三張圖面輸出、以及對角的九張圖像，都是這系列作品的展示與說明。\n這些裝置都實際坐落於台北實踐大學校地內各種不同的空間場域裡，並希望這些裝置的介入，展示出空間不同的面貌。", "ja": "彼の卒業制作は、一連の空間インスタレーション作品です。テーマは時間、空間、そして演劇性についてです。\n\n宙に浮かぶ羅針盤のような三つの装置、入口にある三枚の図面の出力物、そして対角線上に配置された九枚のイメージ、これらすべてがこのシリーズ作品の展示と説明となっています。\n\nこれらの装置は、実際に台北の実践大学のキャンパス内にある様々な空間に設置されており、これらの装置が介入することで、空間の異なる表情を見せることを目指しています。", "custom": true},
  {"id": "custom-1783067866152", "label": "＋", "title": "呂老師作品", "zh": "在台灣有一座名叫日月潭的湖，湖上有一座光華島，島上曾有一間月老廟，但那座廟在九二一地震期間倒塌了。\n現在的廟主希望能夠重建這間廟，因此希望能夠向市政府申請執照，但在這段期間，不得不替廟宇中的神明建造一個臨時的廟。\n於是我們研究了和這間廟有關的各種元素，包含建物型態和周圍氣氛等等，設計了並創造了這個暫時的廟宇。", "ja": "台湾には日月潭という名前の湖がございまして、その湖には光華島という島があります。その島にはかつて月下老人を祀る廟がありましたが、その廟は九二一地震、つまり一九九九年の大地震の際に倒壊してしまいました。\n\n現在の廟の管理者はこの廟を再建したいと考えておりまして、市政府に建築許可を申請しているところなんですが、その許可が下りるまでの間、廟に祀られている神様のために、どうしても仮の廟を建てる必要がありました。\n\nそこで私たちは、この廟に関連する様々な要素、例えば建物の形態ですとか、周辺の雰囲気といったものを研究いたしまして、この仮設の廟をデザインし、実際に造り上げました。", "custom": true},
  {"id": "custom-1783088404487", "label": "＋", "title": "工設作品-月桃", "zh": "這件作品是以使用台灣的 月桃 纖維作為原料進行編織研究的作品。一般常見的月桃編織品多半都只有固定單一的外型，因此她針對月桃這個材料的可能性進行了更多研究，試圖表現他的柔韌性並進行了多種編織方法的研究。\n\n最終透過這個將月桃編織為心型的造型作為一個單元，發展出了這面牆上大家所見的可以向外延續的構造。\n旁邊的牆上則是我在各個階段實驗的過程，大家若有興趣可以前來看看。", "ja": "この作品は台湾の月桃の繊維を原料として使用し、編み方の研究を行った作品です。一般的によく見られる月桃の編み物は、固定された単一の形のものがほとんどですので、彼女は月桃という素材の可能性についてさらに研究を重ね、その柔軟性を表現しようと試み、様々な編み方の研究を行いました。\n\n最終的にこの月桃をハート型に編んだ形を一つのユニットとして、この壁面で皆様がご覧になっているような、外側へと広がっていく構造を発展させました。\n\n隣の壁には、各段階での実験の過程を展示しております。ご興味がございましたら、ぜひご覧ください。", "custom": true},
  {"id": "custom-1783072618675", "label": "＋", "title": "工設系Sally Ending", "zh": "剛才Sally老師也有提到，工設的設計除了腳碰得到、手摸得到、眼睛看得到的作品，也要設計心裡感覺到的。\n\n這裡所呈現的燈具系列設計是使用毛料質地進行設計，從燈光到材質都在呈現家裡的溫暖，讓人想到回到家裡時心底那種溫馨的溫暖。", "ja": "先ほどSally先生もおっしゃっていましたが、インダストリアルデザインでは、足で触れられるもの、手で触れられるもの、目で見られるものだけではなく、心で感じられるものもデザインする必要があります。\n\nこちらに展示されている照明シリーズのデザインは、ウール素材を使用しており、光から素材まで、家の温もりを表現しています。家に帰った時に心の底から感じる、あの温かくて優しい雰囲気を思い起こさせるようなデザインとなっております。", "custom": true}
];

let items = loadItems();
let index = 0;
let showZh = false;
let mode = "view";
let status = "idle";
let errMsg = "";
let translateTimer = null;
let touchStartX = null, touchStartY = null;

function loadItems() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { const parsed = JSON.parse(saved); if (Array.isArray(parsed) && parsed.length > 0) return parsed; }
  } catch (e) {}
  return JSON.parse(JSON.stringify(INITIAL_ITEMS));
}
function saveItems() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (e) {} }

async function translateToJapanese(zhText) {
  let resp;
  try {
    resp = await fetch(TRANSLATE_ENDPOINT, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: zhText }) });
  } catch (netErr) { throw new Error("網路連線失敗：" + (netErr && netErr.message ? netErr.message : "無法連上翻譯服務")); }
  let data;
  try { data = await resp.json(); } catch (e) { throw new Error("回應解析失敗（非 JSON，狀態碼 " + resp.status + "）"); }
  if (!resp.ok) throw new Error(data && data.error ? data.error : ("錯誤 " + resp.status));
  if (!data.ja) throw new Error("翻譯回應為空");
  return data.ja;
}

async function runTranslate(id, zhText) {
  if (!zhText.trim()) return;
  status = "translating"; errMsg = ""; updateStatusText();
  const maxAttempts = 3; let lastErr = null;
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      const ja = await translateToJapanese(zhText);
      const it = items.find((x) => x.id === id);
      if (it) it.ja = ja;
      saveItems();
      status = "idle"; updateStatusText();
      // 只更新目前這頁的日文欄，不重繪整頁（避免打字被打斷）
      if (items[index] && items[index].id === id) updateJaField(ja);
      return;
    } catch (e) { lastErr = e; if (attempt < maxAttempts) await new Promise((r) => setTimeout(r, attempt * 800)); }
  }
  errMsg = (lastErr && lastErr.message ? lastErr.message : String(lastErr)) + "（已自動重試 " + maxAttempts + " 次）";
  status = "error"; updateStatusText();
}

function updateJaField(ja) {
  const ta = document.querySelector("textarea.ja-edit");
  if (!ta) return;
  // 若使用者此刻正在編輯日文欄，就不覆蓋，避免打斷
  if (document.activeElement === ta) return;
  ta.value = ja;
  ta.style.height = "auto";
  ta.style.height = ta.scrollHeight + "px";
}

function updateStatusText() {
  const node = document.getElementById("statusLine");
  if (!node) return;
  let txt = status === "translating" ? "翻訳中…" : status === "pending" ? "変更を検出…" : status === "error" ? "翻訳エラー：" + errMsg : "";
  node.textContent = txt;
  node.className = "status " + (status === "error" ? "err" : "info");
  node.style.display = txt ? "block" : "none";
}

function scheduleTranslate(id, value) {
  const it = items.find((x) => x.id === id);
  if (it) it.zh = value;
  saveItems();
  status = "pending"; updateStatusText();
  if (translateTimer) clearTimeout(translateTimer);
  translateTimer = setTimeout(() => runTranslate(id, value), 1000);
}

function goTo(next) { if (next < 0 || next >= items.length) return; index = next; showZh = false; status = "idle"; render(); }

function addPage() {
  items.push({ id: "custom-" + Date.now(), label: "＋", title: "新頁面", zh: "", ja: "（在下方輸入中文後，日文將自動翻譯出現在這裡）", custom: true });
  saveItems(); mode = "view"; index = items.length - 1; showZh = true; render();
}
function moveItem(from, dir) {
  const to = from + dir;
  if (to < 1 || to >= items.length) return;
  if (items[from].fixed) return;
  const next = items.slice(); const m = next.splice(from, 1)[0]; next.splice(to, 0, m);
  items = next; saveItems(); render();
}
function deleteItem(id) { items = items.filter((it) => it.id !== id); saveItems(); render(); }
function resetAll() {
  if (confirm("確定要還原成初始 15 頁嗎？您新增的頁面與修改將會遺失。")) {
    items = JSON.parse(JSON.stringify(INITIAL_ITEMS)); index = 0; mode = "view"; saveItems(); render();
  }
}

function exportItems() {
  const json = JSON.stringify(items, null, 2);
  const done = () => alert("已複製目前內容到剪貼簿！請貼回對話給 Claude。");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(done).catch(() => fallbackCopy(json, done));
  } else { fallbackCopy(json, done); }
}
function fallbackCopy(text, done) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); done(); }
  catch (e) { alert("複製失敗，請手動長按選取以下內容：\n\n" + text.slice(0, 100) + "…"); }
  document.body.removeChild(ta);
}

function el(tag, props, children) {
  const e = document.createElement(tag);
  if (props) Object.keys(props).forEach((k) => {
    if (k === "class") e.className = props[k];
    else if (k === "style") e.style.cssText = props[k];
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), props[k]);
    else if (k === "disabled") { if (props[k]) e.disabled = true; }
    else e.setAttribute(k, props[k]);
  });
  (children || []).forEach((c) => { if (c != null) e.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
  return e;
}

function autoGrow(ta) { ta.style.height = "auto"; ta.style.height = ta.scrollHeight + "px"; }

function renderManage() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const header = el("header", { style: "display:flex;justify-content:space-between;align-items:center;" }, [
    el("span", { style: "font-size:16px;font-weight:700;" }, ["管理頁面順序"]),
    el("button", { class: "done-btn", onClick: () => { mode = "view"; render(); } }, ["完成"]),
  ]);
  const list = el("main", {}, []);
  items.forEach((it, i) => {
    const info = el("div", { class: "manage-info" }, [
      el("div", { class: "manage-sub" }, [it.fixed ? "固定・開場" : "第 " + (i + 1) + " 頁"]),
      el("div", { class: "manage-title" }, [it.title || "（未命名）"]),
    ]);
    const row = el("div", { class: "manage-item" }, [info]);
    if (!it.fixed) {
      row.appendChild(el("button", { class: "arrow", disabled: i <= 1, onClick: () => moveItem(i, -1) }, ["▲"]));
      row.appendChild(el("button", { class: "arrow", disabled: i >= items.length - 1, onClick: () => moveItem(i, 1) }, ["▼"]));
      row.appendChild(el("button", { class: "del", onClick: () => { if (confirm("確定刪除「" + (it.title || "此頁") + "」？")) deleteItem(it.id); } }, ["刪除"]));
    }
    list.appendChild(row);
  });
  list.appendChild(el("button", { class: "add-page", onClick: addPage }, ["＋ 新增一頁空白頁面"]));
  list.appendChild(el("button", { class: "reset", onClick: resetAll }, ["還原成初始 15 頁"]));
  list.appendChild(el("button", { class: "reset", style: "border-color:#3d3aa8;color:#3d3aa8;margin-top:8px;", onClick: exportItems }, ["📤 匯出目前內容（複製到剪貼簿）"]));
  app.appendChild(header); app.appendChild(list);
}

function renderView() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const total = items.length;
  if (index >= total) index = total - 1;
  const current = items[index];

  const dots = el("div", { class: "dots" }, items.map((it, i) =>
    el("button", { class: "dot" + (i === index ? " active" : ""), onClick: () => goTo(i) }, [])));
  const header = el("header", {}, [
    el("div", { class: "top-row" }, [
      el("span", { class: "brand" }, ["面_面　日文導覽　v3"]),
      el("div", { class: "top-right" }, [
        el("span", { class: "counter" }, [(index + 1) + " / " + total]),
        el("button", { class: "manage-btn", onClick: () => { mode = "manage"; render(); } }, ["管理／新增"]),
      ]),
    ]),
    dots,
  ]);

  const page = el("div", { class: "page" }, []);
  page.appendChild(el("div", { class: "label" }, [current.label]));
  if (current.custom) {
    page.appendChild(el("input", { class: "title-input", value: current.title, placeholder: "輸入此頁標題（作品名）",
      onInput: (e) => { current.title = e.target.value; saveItems(); } }, []));
  } else {
    page.appendChild(el("div", { class: "title" }, [current.title]));
  }

  const statusTxt = status === "translating" ? "翻訳中…" : status === "pending" ? "変更を検出…" : status === "error" ? "翻訳エラー：" + errMsg : "";
  const statusEl = el("div", { class: "status " + (status === "error" ? "err" : "info") }, [statusTxt]);
  statusEl.id = "statusLine"; statusEl.style.display = statusTxt ? "block" : "none";
  page.appendChild(statusEl);

  const jaTa = el("textarea", { class: "ja-edit", rows: "3",
    onInput: (e) => { current.ja = e.target.value; saveItems(); autoGrow(e.target); } }, []);
  jaTa.value = current.ja;
  page.appendChild(jaTa);
  page.appendChild(el("div", { class: "ja-hint" }, ["↑ 日文可直接點擊編輯（翻譯失敗時可手動貼上）"]));

  const toggle = el("button", { class: "toggle-zh", onClick: () => { showZh = !showZh; render(); } },
    [showZh ? "收起中文 ▲" : (current.custom ? "輸入中文 ▼" : "顯示中文對照 ▼")]);
  page.appendChild(toggle);

  if (showZh) {
    const ta = el("textarea", { class: "zh-input", rows: "7",
      placeholder: current.custom ? "在這裡輸入中文講稿，上方會自動翻成日文…" : "",
      onInput: (e) => scheduleTranslate(current.id, e.target.value) }, []);
    ta.value = current.zh;
    page.appendChild(el("div", { class: "zh-wrap" }, [
      el("div", { class: "zh-label" }, ["中文（編輯後日文將自動更新）"]), ta,
    ]));
  }

  const main = el("main", {
    onTouchstart: (e) => {
      // 若起點在文字輸入欄，不啟動翻頁偵測（讓使用者能拖曳選字）
      const t = e.target;
      if (t && (t.tagName === "TEXTAREA" || t.tagName === "INPUT")) { touchStartX = null; touchStartY = null; return; }
      touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
    },
    onTouchend: (e) => {
      if (touchStartX == null) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) { if (dx < 0) goTo(index + 1); else goTo(index - 1); }
      touchStartX = null; touchStartY = null;
    },
  }, [page]);

  const footer = el("footer", {}, [
    el("button", { class: "nav", disabled: index === 0, onClick: () => goTo(index - 1) }, ["← 上一件"]),
    el("span", { class: "hint" }, ["左右滑動翻頁"]),
    el("button", { class: "nav", disabled: index === total - 1, onClick: () => goTo(index + 1) }, ["下一件 →"]),
  ]);

  app.appendChild(header); app.appendChild(main); app.appendChild(footer);
  autoGrow(jaTa);
}

function render() { if (mode === "manage") renderManage(); else renderView(); }
render();
</script>
</body>
</html>
